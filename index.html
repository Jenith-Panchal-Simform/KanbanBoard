<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>KanbanBoard</title>
</head>
<body class="board__container">
        <header class="board__header">
            <h1>Kanban Board</h1>
            <button class="board__button">Create A task</button>
        </header>   
        <main class="board__wrapper">
            <section class=" status">
                <h2>To do </h2>
                <div class="cards__container">
                    <div class="card">1</div>
                    <div class="card">2</div>
                     <div class="card">Counter</div>
                </div>
            </section>
            <section class="status"> 
                <h2>In Progress</h2>
                <div class="cards__container"></div>
            </section>
            <section class=" status">
                <h2>Validation</h2>
                <div class="cards__container"></div>
            </section>
            <section class="status">
                <h2>Completed</h2>
                <div class="cards__container"></div>
            </section>
        </main>
</body>
</html>
