<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>KanbanBoard</title>
</head>
<body class="board__container">
        <h1>Kanban Board</h1>
        <main class="board__wrapper">
            <section class=" status">
                <h2>To do </h2>
                <div class="board__todo">
                    
                </div>
            </section>
            <section class="status"> 
                <h2>In Progress</h2>
                <div class="board__progress"></div>
            </section>
            <section class=" status">
                <h2>Validation</h2>
                <div class="board__validation"></div>
            </section>
            <section class="status">
                <h2>Completed</h2>
                <div class="board__completed"></div>
            </section>
        </main>
</body>
</html>
